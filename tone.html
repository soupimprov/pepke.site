        <p>x-axis: filter frequency&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</p>
 <!-- Draggable DIV -->
 <div id="mydiv" style="position: absolute;
                        z-index: 9;
                        text-align: center;
                        user-select: none;
                        -moz-user-select: none;
                        -khtml-user-select: none;
                        -webkit-user-select: none;
                        -o-user-select: none;">
 
 <script>// Make the DIV element draggable:
        let note = 0;
        let a = 440; //frequency of A
        
        var filter = new Tone.Filter(300,"lowpass").toDestination(vol);
        var vol = new Tone.Volume(-12).toDestination();
        var osc = new Tone.FMSynth().connect(filter);
        osc.harmonicity.value = .8;

        function freq(note) {
               return (a / 32) * (2 ** ((note - 9) / 12));
        }
        function go() {
            osc.triggerAttack(freq(note),".3");
        }
        function stop() {
            osc.triggerRelease(".5");
        }

    dragElement(document.getElementById("mydiv"));
    
    function dragElement(elmnt) {
      var pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
      if (document.getElementById(elmnt.id + "header")) {
        // if present, the header is where you move the DIV from:
        document.getElementById(elmnt.id + "header").onmousedown = dragMouseDown;
      } else {
        // otherwise, move the DIV from anywhere inside the DIV:
        elmnt.onmousedown = dragMouseDown;
      }
    
      function dragMouseDown(e) {
        e = e || window.event;
        go();
        e.preventDefault();
        // get the mouse cursor position at startup:
        pos3 = e.clientX;
        pos4 = e.clientY;
        document.onmouseup = closeDragElement;
        // call a function whenever the cursor moves:
        document.onmousemove = elementDrag;
      }
    
      function elementDrag(e) {
        e = e || window.event;
        e.preventDefault();
        // calculate the new cursor position:
        pos1 = pos3 - e.clientX;
        pos2 = pos4 - e.clientY;
        pos3 = e.clientX;
        pos4 = e.clientY;
        osc.frequency.value = 900 - e.clientY;
        filter.frequency.value = e.clientX / 2
        // set the element's new position:
        elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
        elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
      }
    
      function closeDragElement() {
        // stop moving when mouse button is released:
        document.onmouseup = null;
        document.onmousemove = null;
        stop();
      }
    }
